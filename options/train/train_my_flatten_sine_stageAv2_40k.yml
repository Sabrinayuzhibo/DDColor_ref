#! condB grid + pos enc: 40k train, ddcolor_artistic backbone
#! satgeAv2只用预训练模型来初始化backbone然后其他的全部都是随机初始化的

name: train_my_flatten_sine_stageAv2_40k
model_type: ColorModel
scale: 1
num_gpu: 1
manual_seed: 0
queue_size: 64

datasets:
  train:
    name: ImageNet
    type: LabDataset
    dataroot_gt: /
    meta_info_file: ['data_list/paint_mix_train.txt']
    io_backend:
      type: disk

    gt_size: 256
    use_hflip: True
    use_rot: False

    do_cutmix: False
    cutmix_p: 0.5
    do_fmix: False
    fmix_p: 0.5

    cond_enable: true
    cond_num_regions: 6
    cond_mask_mode: none
    cond_ref_mode: self
    cond_subset_mode: target_only
    cond_ref_subset_mode: same_as_train
    cond_need_masks: false

    use_shuffle: true
    num_worker_per_gpu: 12
    batch_size_per_gpu: 8
    dataset_enlarge_ratio: 1
    pin_memory: true
    persistent_workers: true
    prefetch_mode: cuda

  val:
    name: PaintMixVal
    type: LabDataset
    dataroot_gt: /
    meta_info_file: ['data_list/paint_mix_train_val_small.txt']
    io_backend:
      type: disk

    gt_size: 512
    use_hflip: False
    use_rot: False

    do_cutmix: False
    cutmix_p: 0.0
    do_fmix: False
    fmix_p: 0.0

    cond_enable: true
    cond_num_regions: 6
    cond_mask_mode: none
    cond_ref_mode: self
    cond_need_masks: false

    use_shuffle: false
    num_worker_per_gpu: 4
    batch_size_per_gpu: 1
    dataset_enlarge_ratio: 1
    pin_memory: true
    persistent_workers: false
    prefetch_mode: ~

network_g:
  type: DDColor
  encoder_name: convnext-l
  encoder_from_pretrain: False
  decoder_name: MultiScaleColorDecoder
  num_queries: 100
  num_scales: 3
  dec_layers: 9
  use_cond_gate: true
  cond_gate_init: 0.5
  last_norm: Spectral
  num_output_channels: 2
  do_normalize: False

network_d:
  type: DynamicUNetDiscriminator
  nf: 64
  n_channels: 3

path:
  # 使用现有 artist 预训练权重，仅加载 encoder.* 到 backbone
  pretrain_network_g: /root/autodl-tmp/ddcolor/pretrain/ddcolor_artist/pytorch_model.bin
  param_key_g: encoder
  pretrain_network_d: ~
  pretrain_network_c: ~
  strict_load_g: false
  strict_load_d: false
  strict_load_c: false
  resume_state: ~

train:
  # ✅ 彻底冻结 ConvNeXt 骨干，保护学霸的眼睛！只训练 Pixel Decoder + Color Decoder + net_c
  train_only_cond: false
  train_decoder_cond: true
  train_color_decoder_cond: false

  cond_opt:
    enable: true
    token_mode: multiscale_flatten
    num_scales: 3
    hidden_dim: 256
    use_scale_embed: true
    use_spatial_pos: true
    spatial_pos_type: sine
    freeze_ref_encoder: true  # ✅ 冻结参考图特征提取过程，节省大量显存

  color_enhance: True
  color_enhance_factor: 1.3

  optim_g:
    type: AdamW
    lr: !!float 5.0e-5  # ✅ 稍微降低学习率，让 Transformer 从零开始学得更平稳
    weight_decay: 0.01
    betas: [0.9, 0.99]
  optim_d:
    type: Adam
    lr: !!float 1.0e-5
    weight_decay: 0
    betas: [0.9, 0.99]

  scheduler:
    type: MultiStepLR
    milestones: [20000, 30000]
    gamma: 0.5

  total_iter: 40000
  warmup_iter: -1

  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean

  perceptual_opt:
    type: PerceptualLoss
    layer_weights:
      'conv1_1': 0.0625
      'conv2_1': 0.125
      'conv3_1': 0.25
      'conv4_1': 0.5
      'conv5_1': 1.0
    vgg_type: vgg16_bn
    use_input_norm: true
    range_norm: false
    perceptual_weight: 1.0
    style_weight: 0
    criterion: l1

  ref_style_opt:
    type: PerceptualLoss
    layer_weights:
      'conv1_1': 0.0625
      'conv2_1': 0.125
      'conv3_1': 0.25
      'conv4_1': 0.5
      'conv5_1': 1.0
    vgg_type: vgg16_bn
    use_input_norm: true
    range_norm: false
    perceptual_weight: 0.0
    style_weight: 0.0
    criterion: l1

  ref_moment_opt:
    enable: false

  ref_contrast_opt:
    enable: true
    loss_weight: 0.5
    margin: 0.5
    use_std: true

  local_ab_opt:
    enable: false

  # ✅ 重新引入 GAN，逼迫模型走出灰色安全区，生成高饱和度色彩
  gan_opt:
    type: GANLoss
    gan_type: vanilla
    real_label_val: 1.0
    fake_label_val: 0.0
    loss_weight: 0.15

  # ✅ 重新引入 Colorfulness，惩罚灰褐色
  colorfulness_opt:
    type: ColorfulnessLoss
    loss_weight: 0.2

  cond_gate_push_opt:
    enable: true
    loss_weight: 0.5
    target_sigmoid: 0.80

val:
  val_freq: !!float 2000
  save_img: true
  pbar: false
  suffix: ~
  metrics: {}

logger:
  print_freq: 100
  save_snapshot_freq: ~
  save_snapshot_verbose: false
  save_checkpoint_freq: !!float 5000
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

dist_params:
  backend: nccl
  port: 29500

find_unused_parameters: true