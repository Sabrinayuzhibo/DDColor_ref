#! 新 grid + 多尺度 gate + scale/spatial pos 的 condB 2k 快速实验
#! 参考：train_ddcolor_condB_p1_dense_gated_refboost_20k_perf.yml
#! 目标：先用 2k iter smoke test 验证 grid + pos embedding 版本是否能正常训练和收敛趋势

name: train_ddcolor_condB_p1_grid_posenc_2k
model_type: ColorModel
scale: 1
num_gpu: 1
manual_seed: 0
queue_size: 64

datasets:
  train:
    name: ImageNet
    type: LabDataset
    dataroot_gt: /
    meta_info_file: ['data_list/paint_mix_train.txt']
    io_backend:
      type: disk

    gt_size: 256
    use_hflip: True
    use_rot: False

    do_cutmix: False
    cutmix_p: 0.5
    do_fmix: False
    fmix_p: 0.5

    # 条件：启用参考图 + Pyramid Grid（不再需要语义/人脸掩码）
    cond_enable: true
    cond_num_regions: 6
    cond_mask_mode: none
    cond_ref_mode: random
    cond_subset_mode: target_only
    cond_ref_subset_mode: same_as_train
    cond_need_masks: false

    use_shuffle: true
    num_worker_per_gpu: 12
    batch_size_per_gpu: 8
    dataset_enlarge_ratio: 1
    pin_memory: true
    persistent_workers: true
    prefetch_mode: cuda

  val:
    name: PaintMixVal
    type: LabDataset
    dataroot_gt: /
    meta_info_file: ['data_list/paint_mix_train_val_small.txt']
    io_backend:
      type: disk

    gt_size: 256
    use_hflip: False
    use_rot: False

    do_cutmix: False
    cutmix_p: 0.0
    do_fmix: False
    fmix_p: 0.0

    cond_enable: true
    cond_num_regions: 6
    cond_mask_mode: none
    cond_ref_mode: self
    cond_need_masks: false

    use_shuffle: false
    num_worker_per_gpu: 4
    batch_size_per_gpu: 1
    dataset_enlarge_ratio: 1
    pin_memory: true
    persistent_workers: false
    prefetch_mode: ~

network_g:
  type: DDColor
  encoder_name: convnext-l
  encoder_from_pretrain: False
  decoder_name: MultiScaleColorDecoder
  num_queries: 256
  num_scales: 3
  dec_layers: 9
  use_cond_gate: true
  cond_gate_init: -1.5
  last_norm: Spectral
  num_output_channels: 2
  do_normalize: False

network_d:
  type: DynamicUNetDiscriminator
  nf: 64
  n_channels: 3

path:
  pretrain_network_g: ~
  pretrain_network_d: ~
  pretrain_network_c: ~
  strict_load_g: false
  strict_load_d: false
  strict_load_c: false
  resume_state: ~

train:
  # 是否只训练 conditioner（net_c），主干生成器 net_g 使用预训练权重并冻结
  train_only_cond: true

  # 新版 grid + 多尺度 pos embedding conditioner 配置
  cond_opt:
    enable: true
    token_mode: grid          # 使用 MultiScaleGridTokenConditioner / MultiScaleDenseTokenConditioner
    num_scales: 3
    hidden_dim: 256
    grid_size: 16             # MultiScaleDenseTokenConditioner 基础 grid，内部派生 [16, 8, 4]
    use_scale_embed: true     # 显式尺度嵌入（scale_embed）
    use_spatial_pos: true     # 显式 2D 空间位置编码
    spatial_pos_type: learnable  # learnable | sincos
    include_area_frac: true   # 与原 dense 版本一致，保留面积比特征
    freeze_ref_encoder: false

  color_enhance: True
  color_enhance_factor: 1.08

  optim_g:
    type: AdamW
    lr: !!float 1.2e-5
    weight_decay: 0.01
    betas: [0.9, 0.99]
  optim_d:
    type: Adam
    lr: !!float 1.0e-5
    weight_decay: 0
    betas: [0.9, 0.99]

  scheduler:
    type: MultiStepLR
    milestones: [1200, 1700]  # 2k 总步数下按比例缩放
    gamma: 0.5

  total_iter: 2000            # 按 Agent 约定先做 2k smoke test
  warmup_iter: -1

  pixel_opt:
    type: L1Loss
    loss_weight: 0.0030
    reduction: mean

  perceptual_opt:
    type: PerceptualLoss
    layer_weights:
      'conv1_1': 0.0625
      'conv2_1': 0.125
      'conv3_1': 0.25
      'conv4_1': 0.5
      'conv5_1': 1.0
    vgg_type: vgg16_bn
    use_input_norm: true
    range_norm: false
    perceptual_weight: 0.10
    style_weight: 0
    criterion: l1

  ref_style_opt:
    type: PerceptualLoss
    layer_weights:
      'conv1_1': 0.0625
      'conv2_1': 0.125
      'conv3_1': 0.25
      'conv4_1': 0.5
      'conv5_1': 1.0
    vgg_type: vgg16_bn
    use_input_norm: true
    range_norm: false
    perceptual_weight: 0.0
    style_weight: 3.6
    criterion: l1

  gan_opt:
    type: GANLoss
    gan_type: vanilla
    real_label_val: 1.0
    fake_label_val: 0.0
    loss_weight: 0.24

  colorfulness_opt:
    type: ColorfulnessLoss
    loss_weight: 0.012

  cond_gate_push_opt:
    enable: true
    loss_weight: 0.12
    target_sigmoid: 0.45

val:
  val_freq: !!float 500
  save_img: false
  pbar: false
  suffix: ~
  # 使用空字典避免 basicsr/models/color_model.py 中
  # self.opt['val']['metrics'].get('fid') 访问 None 报错
  metrics: {}

logger:
  print_freq: 100
  save_snapshot_freq: ~
  save_snapshot_verbose: false
  save_checkpoint_freq: !!float 2000
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

dist_params:
  backend: nccl
  port: 29500

find_unused_parameters: true

